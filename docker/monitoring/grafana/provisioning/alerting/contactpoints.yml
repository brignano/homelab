apiVersion: 1

contactPoints:
  - orgId: 1
    name: ntfy
    receivers:
      - uid: ntfy_webhook
        type: webhook
        settings:
          # ?template=grafana => ntfy's built-in Grafana template parses the
          # alert JSON into a readable title + message instead of raw JSON.
          url: http://ntfy:80/homelab-alerts?template=grafana
          httpMethod: POST
        disableResolveMessage: false
