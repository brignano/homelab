apiVersion: 1

groups:
  - orgId: 1
    name: homelab-core
    folder: Homelab Alerts
    interval: 1m
    rules:
      # --- A scrape target / host / exporter is down ---
      - uid: hl-target-down
        title: Target down
        condition: C
        for: 2m
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.job }} target {{ $labels.instance }} is DOWN"
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              expr: up
              instant: true
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: lt, params: [1] }

      # --- Filesystem usage above 85% ---
      - uid: hl-disk-full
        title: Filesystem above 85%
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.host }} {{ $labels.mountpoint }} is {{ printf \"%.0f\" $values.A.Value }}% full"
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              instant: true
              expr: >-
                100 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"}
                / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs"} * 100)
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [85] }

      # --- Available memory below 10% ---
      - uid: hl-mem-low
        title: Available memory below 10%
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.host }} has only {{ printf \"%.0f\" $values.A.Value }}% memory available"
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              instant: true
              expr: >-
                node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes * 100
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: lt, params: [10] }

      # --- A probed service endpoint is unreachable ---
      - uid: hl-probe-down
        title: Service endpoint unreachable
        condition: C
        for: 2m
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
        annotations:
          summary: "Probe failing for {{ $labels.instance }}"
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              expr: probe_success
              instant: true
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: lt, params: [1] }

      # --- PostgreSQL is down ---
      - uid: hl-postgres-down
        title: PostgreSQL down
        condition: C
        for: 2m
        noDataState: OK
        execErrState: Error
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is not responding (pg_up=0)"
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              expr: pg_up
              instant: true
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: lt, params: [1] }
