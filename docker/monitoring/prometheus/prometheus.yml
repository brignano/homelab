global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # LXC / Docker-host node_exporter (runs in the monitoring stack)
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          host: docker-lxc

  # Proxmox host node_exporter (apt-installed on the bare-metal host m5).
  - job_name: node-proxmox
    static_configs:
      - targets: ["10.0.0.200:9100"]
        labels:
          host: proxmox

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  # Proxmox VE API metrics via the multi-target pve-exporter (host m5 API).
  - job_name: pve
    metrics_path: /pve
    params:
      module: [default]
    static_configs:
      - targets:
          - 10.0.0.200
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: pve-exporter:9221

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  # Endpoint uptime probing via blackbox-exporter (multi-target).
  - job_name: blackbox
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://grafana:3000/api/health
          - http://prometheus:9090/-/healthy
          - http://loki:3100/ready
          - http://portainer:9000/
          - http://open-webui:8080/
          - http://ollama:11434/
          - http://caddy:80/
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]

  - job_name: alloy
    static_configs:
      - targets: ["alloy:12345"]
