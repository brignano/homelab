services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    networks:
      - ai
    # Uncomment if the host has a GPU available to Docker:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:?required}
    volumes:
      - open_webui_data:/app/backend/data
    ports:
      - "127.0.0.1:3010:8080"
    networks:
      - ai
    depends_on:
      - ollama

volumes:
  ollama_data:
  open_webui_data:

networks:
  ai:
    driver: bridge
