services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      # Keep models resident in RAM instead of evicting after the 5-min default.
      # A cold load of llama3.2:3b on CPU costs ~40s; without this, any chat after
      # an idle gap eats that reload before the first token — felt as "slow" even
      # though generation itself runs at ~16 tok/s. The 3B model is ~2-3 GB, well
      # within the LXC's 14 GB. -1 = never unload.
      OLLAMA_KEEP_ALIVE: "-1"
    networks:
      - ai
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    # Uncomment if the host has a GPU available to Docker:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:?required}
    volumes:
      - open_webui_data:/app/backend/data
    ports:
      - "3010:8080"
    networks:
      - ai
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  ollama_data:
  open_webui_data:

networks:
  ai:
    driver: bridge
