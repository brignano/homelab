services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      # Idle-unload models after 5 min. We now run two models (llama3.2:3b for
      # quick chats, qwen2.5:7b for trustworthy web-search answers); pinning both
      # resident (-1) is ~8 GB and crowds the 14 GB LXC alongside the other
      # containers. With 5m, Ollama loads whichever model the chat selects and
      # frees it after an idle gap. Cost: a ~10-40s reload when you switch models
      # or return after idle — acceptable vs. the RAM pressure of pinning both.
      OLLAMA_KEEP_ALIVE: "5m"
    networks:
      - ai
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    # Uncomment if the host has a GPU available to Docker:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:?required}
      # Web search via the local SearXNG below (same network, no host port).
      # These seed a fresh instance; on an existing data volume Open WebUI keeps
      # the values set in the UI (PersistentConfig), so also switch the engine to
      # "searxng" + set this query URL under Admin > Settings > Web Search.
      ENABLE_WEB_SEARCH: "true"
      WEB_SEARCH_ENGINE: "searxng"
      SEARXNG_QUERY_URL: "http://searxng:8080/search?q=<query>"
      WEB_SEARCH_RESULT_COUNT: "3"
      WEB_SEARCH_CONCURRENT_REQUESTS: "3"
    volumes:
      - open_webui_data:/app/backend/data
    ports:
      - "3010:8080"
    networks:
      - ai
    depends_on:
      ollama:
        condition: service_healthy
      searxng:
        condition: service_healthy

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    environment:
      # Entrypoint substitutes this into settings.yml's secret_key at startup.
      SEARXNG_SECRET: ${SEARXNG_SECRET:?required}
    volumes:
      - ./searxng:/etc/searxng:rw
    networks:
      - ai
    # No host port: only Open WebUI (same network) needs it, reached at
    # http://searxng:8080. Internal-only per the repo's binding convention.
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  ollama_data:
  open_webui_data:

networks:
  ai:
    driver: bridge
